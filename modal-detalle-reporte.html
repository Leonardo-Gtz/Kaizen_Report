<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Reporte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-container {
            background: white;
            border-radius: 20px;
            width: 95%;
            max-width: 1200px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 24px;
            font-weight: 600;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 30px;
            overflow-y: auto;
            max-height: calc(90vh - 150px);
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 15px;
        }

        .status-pendiente { background: #fff3cd; color: #856404; }
        .status-aprobado { background: #d4edda; color: #155724; }
        .status-rechazado { background: #f8d7da; color: #721c24; }
        .status-borrador { background: #d1ecf1; color: #0c5460; }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            font-size: 12px;
            color: #6c757d;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .info-value {
            font-size: 15px;
            color: #212529;
            font-weight: 500;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #667eea;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }

        .description-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #28a745;
        }

        .description-box.before {
            border-left-color: #dc3545;
        }

        .description-box.after {
            border-left-color: #28a745;
        }

        .description-title {
            font-size: 14px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 10px;
        }

        .description-text {
            font-size: 14px;
            color: #212529;
            line-height: 1.6;
        }

        .participants-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .participant-chip {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 16px;
            border-radius: 25px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .participant-icon {
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .evaluation-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
        }

        .evaluation-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .evaluation-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        .evaluation-item-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .evaluation-item-value {
            font-size: 16px;
            font-weight: 600;
        }

        .file-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .file-link:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .image-container {
            margin-top: 15px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .image-container img {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
            background: #f8f9fa;
        }

        .risk-analysis-card {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .risk-title {
            font-size: 14px;
            font-weight: 600;
            color: #856404;
            margin-bottom: 10px;
        }

        .risk-description {
            font-size: 14px;
            color: #212529;
            line-height: 1.6;
        }

        .approval-status {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .approval-item {
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
        }

        .approval-label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .approval-value {
            font-size: 16px;
            font-weight: 600;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #6c757d;
            font-style: italic;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 18px;
            color: #667eea;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="modal-overlay">
        <div class="modal-container">
            <div class="modal-header">
                <h2>📋 Detalle del Reporte <span id="reporteId"></span></h2>
                <button class="close-btn" onclick="cerrarModal()">×</button>
            </div>
            <div class="modal-body" id="modalContent">
                <div class="loading">
                    <div class="spinner"></div>
                    Cargando información del reporte...
                </div>
            </div>
        </div>
    </div>

    <script>
        // Obtener ID del reporte desde URL
        const urlParams = new URLSearchParams(window.location.search);
        const reporteId = urlParams.get('id');

        if (reporteId) {
            document.getElementById('reporteId').textContent = `#${reporteId}`;
            cargarDetalleReporte(reporteId);
        } else {
            document.getElementById('modalContent').innerHTML = '<div class="no-data">No se especificó un ID de reporte</div>';
        }

        function cerrarModal() {
            window.close();
        }

        async function cargarDetalleReporte(id) {
            try {
                const response = await fetch(`api-detalle-reporte.php?id=${id}`);
                const data = await response.json();

                if (data.success) {
                    mostrarDetalleReporte(data.reporte);
                } else {
                    document.getElementById('modalContent').innerHTML = `<div class="no-data">Error: ${data.mensaje}</div>`;
                }
            } catch (error) {
                document.getElementById('modalContent').innerHTML = `<div class="no-data">Error al cargar el reporte: ${error.message}</div>`;
            }
        }

        function mostrarDetalleReporte(reporte) {
            const statusClass = `status-${reporte.estado?.toLowerCase() || 'pendiente'}`;
            
            let html = `
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-label">Estado</div>
                        <div class="info-value">
                            <span class="status-badge ${statusClass}">${reporte.estado || 'N/A'}</span>
                        </div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Fecha de Creación</div>
                        <div class="info-value">${formatearFecha(reporte.fecha_creacion)}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Creado Por</div>
                        <div class="info-value">${reporte.creado_por || 'N/A'}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Departamento</div>
                        <div class="info-value">${reporte.departamento || 'N/A'}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Área</div>
                        <div class="info-value">${reporte.area || 'N/A'}</div>
                    </div>
                    <div class="info-card">
                        <div class="info-label">Tipo de Mejora</div>
                        <div class="info-value">${reporte.tipo_mejora || 'N/A'}</div>
                    </div>
                </div>

                <div class="section-title">📝 Descripción Extensa del Reporte</div>
                <div class="description-box before">
                    <div class="description-title">Situación Antes de la Mejora</div>
                    <div class="description-text">${reporte.descripcion_anterior || 'No especificada'}</div>
                </div>
                <div class="description-box after">
                    <div class="description-title">Mejora Implementada</div>
                    <div class="description-text">${reporte.descripcion_mejora || 'No especificada'}</div>
                </div>
            `;

            // Análisis de Riesgo
            if (reporte.analisis_riesgo || reporte.archivo_riesgo) {
                html += '<div class="section-title">⚠️ Análisis de Riesgo</div>';
                
                if (reporte.analisis_riesgo) {
                    html += `
                        <div class="risk-analysis-card">
                            <div class="risk-title">Descripción del Riesgo</div>
                            <div class="risk-description">${reporte.analisis_riesgo}</div>
                        </div>
                    `;
                }
                
                if (reporte.archivo_riesgo) {
                    html += `
                        <div style="margin-top: 15px;">
                            <a href="${reporte.archivo_riesgo}" target="_blank" class="file-link">
                                📄 Descargar Archivo de Análisis de Riesgo
                            </a>
                        </div>
                    `;
                }
            }

            // Imagen de Evidencia
            if (reporte.foto_evidencia) {
                html += `
                    <div class="section-title">📷 Imagen de Evidencia</div>
                    <div class="image-container">
                        <img src="${reporte.foto_evidencia}" alt="Evidencia del reporte" />
                    </div>
                `;
            }

            // Participantes
            html += '<div class="section-title">👥 Participantes</div>';
            if (reporte.participantes && reporte.participantes.length > 0) {
                html += '<div class="participants-list">';
                reporte.participantes.forEach(p => {
                    const inicial = p.nombre.charAt(0).toUpperCase();
                    html += `
                        <div class="participant-chip">
                            <div class="participant-icon">${inicial}</div>
                            <div>
                                <div style="font-weight: 600;">${p.nombre}</div>
                                <div style="font-size: 11px; opacity: 0.9;">${p.departamento}</div>
                            </div>
                        </div>
                    `;
                });
                html += '</div>';
            } else {
                html += '<div class="no-data">No hay participantes registrados</div>';
            }

            // Evaluación Registrada
            if (reporte.evaluacion) {
                html += `
                    <div class="section-title">⭐ Evaluación Registrada</div>
                    <div class="evaluation-card">
                        <h3 style="margin-bottom: 15px;">Clasificación: ${reporte.evaluacion.clasificacion || 'N/A'}</h3>
                        
                        <div class="evaluation-item-label">Fecha de Evaluación</div>
                        <div class="evaluation-item-value" style="margin-bottom: 20px;">${formatearFecha(reporte.evaluacion.fecha)}</div>
                `;

                if (reporte.evaluacion.aspectos_evaluados) {
                    html += '<div class="evaluation-item-label" style="margin-top: 15px; margin-bottom: 10px;">Aspectos Evaluados</div>';
                    html += '<div class="evaluation-grid">';
                    for (const [aspecto, valor] of Object.entries(reporte.evaluacion.aspectos_evaluados)) {
                        html += `
                            <div class="evaluation-item">
                                <div class="evaluation-item-label">${aspecto}</div>
                                <div class="evaluation-item-value">${valor}/10</div>
                            </div>
                        `;
                    }
                    html += '</div>';
                }

                // Estados de Aprobación
                if (reporte.aprobado_jefe !== undefined || reporte.aprobado_gerente !== undefined || reporte.aprobado_director !== undefined) {
                    html += '<div class="evaluation-item-label" style="margin-top: 20px; margin-bottom: 10px;">Estados de Aprobación</div>';
                    html += '<div class="approval-status">';
                    
                    if (reporte.aprobado_jefe !== undefined) {
                        const estadoJefe = reporte.aprobado_jefe === 1 ? '✅ Aprobado' : reporte.aprobado_jefe === 0 ? '❌ Rechazado' : '⏳ Pendiente';
                        html += `
                            <div class="approval-item">
                                <div class="approval-label">Jefe de Área</div>
                                <div class="approval-value">${estadoJefe}</div>
                            </div>
                        `;
                    }
                    
                    if (reporte.aprobado_gerente !== undefined) {
                        const estadoGerente = reporte.aprobado_gerente === 1 ? '✅ Aprobado' : reporte.aprobado_gerente === 0 ? '❌ Rechazado' : '⏳ Pendiente';
                        html += `
                            <div class="approval-item">
                                <div class="approval-label">Gerente</div>
                                <div class="approval-value">${estadoGerente}</div>
                            </div>
                        `;
                    }
                    
                    if (reporte.aprobado_director !== undefined) {
                        const estadoDirector = reporte.aprobado_director === 1 ? '✅ Aprobado' : reporte.aprobado_director === 0 ? '❌ Rechazado' : '⏳ Pendiente';
                        html += `
                            <div class="approval-item">
                                <div class="approval-label">Director</div>
                                <div class="approval-value">${estadoDirector}</div>
                            </div>
                        `;
                    }
                    
                    html += '</div>';
                }

                html += '</div>';
            } else {
                html += `
                    <div class="section-title">⭐ Evaluación Registrada</div>
                    <div class="no-data">Este reporte aún no ha sido evaluado</div>
                `;
            }

            document.getElementById('modalContent').innerHTML = html;
        }

        function formatearFecha(fecha) {
            if (!fecha) return 'N/A';
            const date = new Date(fecha);
            return date.toLocaleDateString('es-MX', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
